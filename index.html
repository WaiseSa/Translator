<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Tradutor · Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #0a0a0f;
–card: #12121a;
–border: #1e1e2e;
–text: #e8e8f0;
–muted: #44445a;
–accent-green: #00e5a0;
–accent-blue: #4d8cff;
–accent-orange: #ff8c42;
–red: #ff4d6d;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘Syne’, sans-serif;
min-height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
padding: 20px 16px 32px;
gap: 0;
position: relative;
overflow-x: hidden;
}

/* Background glow */
body::before {
content: ‘’;
position: fixed;
width: 400px; height: 400px;
border-radius: 50%;
background: radial-gradient(circle, rgba(0,229,160,0.04) 0%, transparent 70%);
top: -100px; left: 50%; transform: translateX(-50%);
pointer-events: none;
}

/* Header */
.header {
width: 100%; max-width: 480px;
display: flex; align-items: center; justify-content: space-between;
padding: 8px 0 20px;
}

.logo {
font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
background: linear-gradient(135deg, var(–accent-green), var(–accent-blue));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.mode-badge {
font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
padding: 4px 10px; border-radius: 999px;
border: 1px solid var(–muted); color: var(–muted);
transition: all 0.3s;
}
.mode-badge.online  { border-color: var(–accent-green); color: var(–accent-green); }
.mode-badge.offline { border-color: var(–accent-orange); color: var(–accent-orange); }
.mode-badge.loading { border-color: var(–accent-blue); color: var(–accent-blue); }

/* Model loader bar */
#modelBar {
width: 100%; max-width: 480px;
background: var(–card); border: 1px solid var(–border);
border-radius: 14px; padding: 16px;
margin-bottom: 16px; display: none;
}
.model-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.model-bar-title { font-size: 12px; color: var(–accent-blue); letter-spacing: 1px; }
.model-bar-pct { font-size: 12px; color: var(–muted); font-family: monospace; }
.prog-bg { height: 4px; background: var(–border); border-radius: 999px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(–accent-blue), var(–accent-green)); border-radius: 999px; width: 0%; transition: width 0.4s ease; }
.model-bar-status { font-size: 11px; color: var(–muted); margin-top: 8px; font-family: monospace; }

/* Main orb area */
.orb-section {
display: flex; flex-direction: column; align-items: center;
gap: 20px; padding: 16px 0 24px; width: 100%;
}

.lang-row {
display: flex; align-items: center; gap: 12px;
font-size: 13px; font-weight: 600;
}
.lang-pill {
padding: 6px 14px; border-radius: 999px; border: 1px solid var(–border);
color: var(–muted); transition: all 0.3s; font-size: 12px;
}
.lang-pill.active-pt { border-color: var(–accent-green); color: var(–accent-green); background: rgba(0,229,160,0.08); }
.lang-pill.active-en { border-color: var(–accent-blue); color: var(–accent-blue); background: rgba(77,140,255,0.08); }
.arrow { color: var(–muted); font-size: 14px; }

/* Orb */
.orb-wrap {
position: relative; width: 180px; height: 180px;
display: flex; align-items: center; justify-content: center;
}

.ring {
position: absolute; border-radius: 50%;
border: 1px solid transparent; transition: all 0.3s;
}
.ring1 { width: 150px; height: 150px; }
.ring2 { width: 166px; height: 166px; }
.ring3 { width: 182px; height: 182px; }

.orb-wrap.listening .ring1 { border-color: rgba(0,229,160,0.5); animation: pr 1.4s ease-out infinite; }
.orb-wrap.listening .ring2 { border-color: rgba(0,229,160,0.25); animation: pr 1.4s ease-out infinite 0.25s; }
.orb-wrap.listening .ring3 { border-color: rgba(0,229,160,0.1); animation: pr 1.4s ease-out infinite 0.5s; }
.orb-wrap.speaking .ring1  { border-color: rgba(77,140,255,0.5); animation: pr 1s ease-out infinite; }
.orb-wrap.speaking .ring2  { border-color: rgba(77,140,255,0.25); animation: pr 1s ease-out infinite 0.2s; }
.orb-wrap.speaking .ring3  { border-color: rgba(77,140,255,0.1); animation: pr 1s ease-out infinite 0.4s; }
.orb-wrap.thinking .ring1  { border-color: rgba(255,140,66,0.5); animation: pr 0.8s ease-out infinite; }
.orb-wrap.thinking .ring2  { border-color: rgba(255,140,66,0.25); animation: pr 0.8s ease-out infinite 0.15s; }
.orb-wrap.thinking .ring3  { border-color: rgba(255,140,66,0.1); animation: pr 0.8s ease-out infinite 0.3s; }

@keyframes pr {
0%   { transform: scale(1); opacity: 1; }
100% { transform: scale(1.12); opacity: 0; }
}

.orb {
width: 130px; height: 130px; border-radius: 50%;
background: radial-gradient(circle at 35% 30%, #1e1e2e, #0a0a0f);
border: 1.5px solid var(–border);
display: flex; align-items: center; justify-content: center;
font-size: 48px; position: relative; z-index: 2;
cursor: pointer; user-select: none;
transition: transform 0.15s, border-color 0.3s, box-shadow 0.3s;
box-shadow: 0 0 0 0 rgba(0,229,160,0);
}

.orb:active, .orb.held {
transform: scale(0.94);
border-color: var(–accent-green);
box-shadow: 0 0 30px rgba(0,229,160,0.2);
}

.orb-wrap.listening .orb { border-color: var(–accent-green); }
.orb-wrap.speaking .orb  { border-color: var(–accent-blue); }
.orb-wrap.thinking .orb  { border-color: var(–accent-orange); }

.status-text {
font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
color: var(–muted); text-align: center; min-height: 16px;
transition: color 0.3s;
}
.status-text.listening { color: var(–accent-green); }
.status-text.speaking  { color: var(–accent-blue); }
.status-text.thinking  { color: var(–accent-orange); }
.status-text.error     { color: var(–red); }

.hold-hint {
font-size: 11px; color: var(–muted); letter-spacing: 1px;
text-align: center; opacity: 0.6;
}

/* Cards */
.cards { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; }

.card {
background: var(–card); border: 1px solid var(–border);
border-radius: 16px; padding: 14px 16px; min-height: 72px;
transition: border-color 0.3s;
}
.card.highlight { border-color: var(–accent-blue); }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(–muted); }
.card-actions { display: flex; gap: 8px; }

.icon-btn {
background: none; border: 1px solid var(–border); border-radius: 8px;
color: var(–muted); cursor: pointer; font-size: 13px;
padding: 4px 10px; transition: all 0.2s; font-family: ‘Syne’, sans-serif;
display: flex; align-items: center; gap: 4px;
}
.icon-btn:hover { color: var(–text); border-color: var(–muted); }
.icon-btn:active { transform: scale(0.95); }

.card-text {
font-size: 16px; line-height: 1.6; color: var(–text);
min-height: 26px; word-break: break-word;
}
.card-text.dim { color: var(–muted); font-size: 13px; font-weight: 400; }
.card-text.interim { color: #334; font-style: italic; }

.translation-text { color: var(–accent-blue); }

/* History */
.history-section { width: 100%; max-width: 480px; margin-top: 4px; }
.history-title {
font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
color: var(–muted); padding: 0 4px; margin-bottom: 8px;
}
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
background: var(–card); border: 1px solid var(–border);
border-radius: 12px; padding: 10px 14px;
display: flex; justify-content: space-between; align-items: flex-start;
gap: 12px; opacity: 0.7;
animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 0.7; } }
.history-texts { flex: 1; min-width: 0; }
.history-original { font-size: 12px; color: var(–muted); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-translated { font-size: 13px; color: var(–text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-replay {
background: none; border: 1px solid var(–border); border-radius: 8px;
color: var(–muted); cursor: pointer; font-size: 14px; padding: 4px 8px;
flex-shrink: 0; transition: all 0.2s;
}
.history-replay:hover { color: var(–accent-blue); border-color: var(–accent-blue); }
</style>

</head>
<body>

<div class="header">
  <div class="logo">PT ↔ EN</div>
  <div class="mode-badge" id="modeBadge">Initializing</div>
</div>

<div id="modelBar">
  <div class="model-bar-top">
    <span class="model-bar-title">DOWNLOADING OFFLINE MODEL</span>
    <span class="model-bar-pct" id="modelPct">0%</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="modelFill"></div></div>
  <div class="model-bar-status" id="modelStatus">Preparing...</div>
</div>

<div class="orb-section">
  <div class="lang-row">
    <div class="lang-pill" id="pillPT">🇧🇷 Português</div>
    <div class="arrow">⇄</div>
    <div class="lang-pill" id="pillEN">🇺🇸 English</div>
  </div>

  <div class="orb-wrap" id="orbWrap">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="orb" id="orb">🎙️</div>
  </div>

  <div class="status-text" id="statusText">Hold to speak</div>
  <div class="hold-hint">hold button · speak · release to translate</div>
</div>

<div class="cards">
  <div class="card">
    <div class="card-header">
      <span class="card-label">Heard</span>
    </div>
    <div class="card-text dim" id="heardText">Hold the mic and speak...</div>
  </div>

  <div class="card" id="translationCard">
    <div class="card-header">
      <span class="card-label" id="translationLabel">🔊 Translation</span>
      <div class="card-actions">
        <button class="icon-btn" id="repeatBtn" onclick="repeatLast()" style="display:none">↺ Repeat</button>
        <button class="icon-btn" id="copyBtn" onclick="copyLast()" style="display:none">⧉ Copy</button>
      </div>
    </div>
    <div class="card-text dim translation-text" id="translatedText">Translation will appear here...</div>
  </div>
</div>

<div class="history-section" id="historySection" style="display:none">
  <div class="history-title">Recent</div>
  <div class="history-list" id="historyList"></div>
</div>

<script type="module">
  // ─── State ───────────────────────────────────────────────────────
  let offlineTranslator = null;
  let isOnline = navigator.onLine;
  let isListening = false;
  let isSpeaking = false;
  let recognition = null;
  let lastTranslated = '';
  let lastTranslatedLang = 'en-US';
  let history = [];
  let holding = false;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  // ─── Elements ────────────────────────────────────────────────────
  const orbWrap    = document.getElementById('orbWrap');
  const orb        = document.getElementById('orb');
  const statusText = document.getElementById('statusText');
  const modeBadge  = document.getElementById('modeBadge');
  const modelBar   = document.getElementById('modelBar');
  const modelFill  = document.getElementById('modelFill');
  const modelPct   = document.getElementById('modelPct');
  const modelStatus= document.getElementById('modelStatus');
  const heardText  = document.getElementById('heardText');
  const translatedText = document.getElementById('translatedText');
  const translationLabel = document.getElementById('translationLabel');
  const pillPT     = document.getElementById('pillPT');
  const pillEN     = document.getElementById('pillEN');
  const repeatBtn  = document.getElementById('repeatBtn');
  const copyBtn    = document.getElementById('copyBtn');

  // ─── Helpers ─────────────────────────────────────────────────────
  function setStatus(text, cls) {
    statusText.textContent = text;
    statusText.className = 'status-text ' + (cls || '');
  }

  function setOrb(state) {
    orbWrap.className = 'orb-wrap ' + state;
    if (state === 'speaking') orb.textContent = '🔊';
    else if (state === 'thinking') orb.textContent = '⏳';
    else orb.textContent = '🎙️';
  }

  function updateModeBadge() {
    if (!isOnline) {
      modeBadge.textContent = offlineTranslator ? 'Offline ✓' : 'Offline — No Model';
      modeBadge.className = 'mode-badge offline';
    } else {
      modeBadge.textContent = offlineTranslator ? 'Hybrid' : 'Online';
      modeBadge.className = 'mode-badge online';
    }
  }

  function detectLanguage(text) {
    const ptPatterns = /\b(eu|você|voce|ele|ela|nós|nos|eles|mas|não|nao|com|para|uma|isso|esse|esta|como|mais|por|muito|quando|então|entao|que|em|de|do|da|no|na|ao|um|os|as|seu|sua|meu|minha|tem|são|sao|está|esta|foi|ser|ter|fazer|quero|preciso|obrigado|obrigada|sim|bom|boa|tudo|bem|olá|ola|oi|tchau|falar|dizer|aqui|hoje|amanhã|amanha|sempre|nunca|também|tambem|ainda|já|ja|agora|depois|antes|porque|legal|cara|gente|tá|ta|né|ne)\b/i;
    const ptChars = /[ãõâêîôûàáéíóúç]/i;
    const score = (ptPatterns.test(text) ? 2 : 0) + (ptChars.test(text) ? 3 : 0);
    return score >= 2 ? 'pt-BR' : 'en-US';
  }

  function showDetected(lang) {
    pillPT.className = 'lang-pill' + (lang === 'pt-BR' ? ' active-pt' : '');
    pillEN.className = 'lang-pill' + (lang === 'en-US' ? ' active-en' : '');
    if (lang === 'pt-BR') {
      translationLabel.textContent = '🔊 English Translation';
    } else {
      translationLabel.textContent = '🔊 Tradução em Português';
    }
  }

  // ─── Offline model ───────────────────────────────────────────────
  async function loadOfflineModel() {
    try {
      const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js');
      env.allowLocalModels = false;
      env.useBrowserCache = true;

      modelBar.style.display = 'block';
      modeBadge.textContent = 'Downloading...';
      modeBadge.className = 'mode-badge loading';

      offlineTranslator = await pipeline('translation', 'Xenova/opus-mt-tc-big-en-pt', {
        progress_callback: (p) => {
          if (p.status === 'downloading') {
            const pct = Math.round(p.progress || 0);
            modelFill.style.width = pct + '%';
            modelPct.textContent = pct + '%';
            modelStatus.textContent = 'Downloading: ' + (p.file || '...');
          }
          if (p.status === 'ready') {
            modelFill.style.width = '100%';
            modelPct.textContent = '100%';
            modelStatus.textContent = 'Model ready ✓';
          }
        }
      });

      setTimeout(() => { modelBar.style.display = 'none'; }, 1500);
      updateModeBadge();
      setStatus('Hold to speak', '');

    } catch (e) {
      modelBar.style.display = 'none';
      console.warn('Offline model failed to load:', e);
      updateModeBadge();
    }
  }

  // ─── Translation ─────────────────────────────────────────────────
  async function translate(text, fromLang) {
    const toLang = fromLang === 'pt-BR' ? 'en-US' : 'pt-BR';

    // Try offline model first
    if (offlineTranslator) {
      try {
        const srcLang = fromLang === 'pt-BR' ? 'por_Latn' : 'eng_Latn';
        const tgtLang = fromLang === 'pt-BR' ? 'eng_Latn' : 'por_Latn';
        const result = await offlineTranslator(text, { src_lang: srcLang, tgt_lang: tgtLang });
        return result[0]?.translation_text || result[0]?.generated_text || null;
      } catch (e) {
        console.warn('Offline translation failed, trying online...', e);
      }
    }

    // Fallback to Claude API (online)
    if (!isOnline) return null;

    const prompt = fromLang === 'pt-BR'
      ? `Translate this Brazilian Portuguese to English. Return ONLY the translation:\n\n${text}`
      : `Translate this English to Brazilian Portuguese. Return ONLY the translation:\n\n${text}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    return data?.content?.[0]?.text?.trim() || null;
  }

  async function handleFinalSpeech(text) {
    if (!text.trim()) return;

    const fromLang = detectLanguage(text);
    showDetected(fromLang);
    heardText.textContent = text;
    heardText.className = 'card-text';

    setOrb('thinking');
    setStatus('Translating...', 'thinking');
    translatedText.textContent = '...';
    translatedText.className = 'card-text dim translation-text';

    try {
      const result = await translate(text, fromLang);
      if (!result) throw new Error('No translation');

      lastTranslated = result;
      lastTranslatedLang = fromLang === 'pt-BR' ? 'en-US' : 'pt-BR';

      translatedText.textContent = result;
      translatedText.className = 'card-text translation-text';
      repeatBtn.style.display = 'flex';
      copyBtn.style.display = 'flex';

      addHistory(text, result, lastTranslatedLang);
      speak(result, lastTranslatedLang);

    } catch (e) {
      translatedText.textContent = isOnline ? 'Translation failed' : 'No internet & no offline model';
      translatedText.className = 'card-text dim translation-text';
      setOrb('');
      setStatus('Hold to speak', '');
    }
  }

  // ─── TTS ─────────────────────────────────────────────────────────
  function speak(text, lang) {
    if (!text) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang; utt.rate = 0.92; utt.pitch = 1;

    const voices = window.speechSynthesis.getVoices();
    let preferred;
    if (lang === 'pt-BR') {
      preferred = voices.find(v => v.lang === 'pt-BR') || voices.find(v => v.lang.startsWith('pt'));
    } else {
      preferred = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Samantha') || v.name.includes('Google US') || v.name.includes('Daniel')))
                  || voices.find(v => v.lang.startsWith('en'));
    }
    if (preferred) utt.voice = preferred;

    utt.onstart = () => { isSpeaking = true; setOrb('speaking'); setStatus('Speaking...', 'speaking'); };
    utt.onend = () => {
      isSpeaking = false;
      setOrb('');
      setStatus('Hold to speak', '');
    };
    utt.onerror = () => { isSpeaking = false; setOrb(''); setStatus('Hold to speak', ''); };
    window.speechSynthesis.speak(utt);
  }

  // ─── Speech recognition ──────────────────────────────────────────
  function startListening() {
    if (!SpeechRecognition || isListening || isSpeaking) return;
    window.speechSynthesis.cancel();
    isSpeaking = false;

    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'pt-BR'; // handles both PT and EN
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isListening = true;
      setOrb('listening');
      setStatus('Listening...', 'listening');
      heardText.textContent = '';
      heardText.className = 'card-text interim';
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      if (interim) { heardText.textContent = interim; heardText.className = 'card-text interim'; }
      if (final)   { heardText.textContent = final; heardText.className = 'card-text'; }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      setStatus('Mic error: ' + e.error, 'error');
      isListening = false;
    };

    recognition.onend = () => {
      isListening = false;
      const text = heardText.textContent.trim();
      if (text && heardText.className !== 'card-text dim') {
        handleFinalSpeech(text);
      } else {
        setOrb('');
        setStatus('Hold to speak', '');
      }
    };

    try { recognition.start(); } catch(e) { isListening = false; }
  }

  function stopListening() {
    if (recognition && isListening) {
      try { recognition.stop(); } catch(e) {}
    }
  }

  // ─── Hold-to-talk ─────────────────────────────────────────────────
  orb.addEventListener('mousedown',  () => { holding = true; startListening(); });
  orb.addEventListener('touchstart', (e) => { e.preventDefault(); holding = true; startListening(); }, { passive: false });
  orb.addEventListener('mouseup',    () => { if (holding) { holding = false; stopListening(); } });
  orb.addEventListener('touchend',   (e) => { e.preventDefault(); if (holding) { holding = false; stopListening(); } });
  orb.addEventListener('mouseleave', () => { if (holding) { holding = false; stopListening(); } });

  // ─── History ──────────────────────────────────────────────────────
  function addHistory(original, translated, translatedLang) {
    history.unshift({ original, translated, translatedLang });
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="history-item">
        <div class="history-texts">
          <div class="history-original">${h.original}</div>
          <div class="history-translated">${h.translated}</div>
        </div>
        <button class="history-replay" onclick="replayHistory(${i})">▶</button>
      </div>
    `).join('');
  }

  window.replayHistory = (i) => {
    const h = history[i];
    if (h) speak(h.translated, h.translatedLang);
  };

  // ─── Actions ─────────────────────────────────────────────────────
  window.repeatLast = () => { if (lastTranslated) speak(lastTranslated, lastTranslatedLang); };
  window.copyLast   = () => {
    if (!lastTranslated) return;
    navigator.clipboard.writeText(lastTranslated);
    copyBtn.textContent = '✓ Copied';
    setTimeout(() => copyBtn.textContent = '⧉ Copy', 2000);
  };

  // ─── Connectivity ────────────────────────────────────────────────
  window.addEventListener('online',  () => { isOnline = true;  updateModeBadge(); });
  window.addEventListener('offline', () => { isOnline = false; updateModeBadge(); });

  // ─── Init ────────────────────────────────────────────────────────
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  updateModeBadge();

  // Try to load offline model in background
  loadOfflineModel();
</script>

</body>
</html>
