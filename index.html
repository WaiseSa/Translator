<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Tradutor · Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #080810;
–mid: #0f0f1a;
–card: #13131f;
–border: #1c1c30;
–text: #eeeef8;
–muted: #3a3a5a;
–green: #00e5a0;
–blue: #4d8cff;
–orange: #ffaa00;
–red: #ff4d6d;
–green-bg: rgba(0,229,160,0.07);
–blue-bg: rgba(77,140,255,0.07);
}

html, body { height: 100%; width: 100%; background: var(–bg); color: var(–text); font-family: ‘Syne’, sans-serif; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100dvh; width: 100%; }

.half {
flex: 1; display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 14px; padding: 20px 20px 16px;
position: relative; cursor: pointer; user-select: none;
transition: background 0.25s; -webkit-tap-highlight-color: transparent;
}
.half.top { transform: rotate(180deg); border-bottom: 1px solid var(–border); background: var(–mid); }
.half.bottom { background: var(–mid); }
.half.active { background: var(–green-bg); }
.half.active.english { background: var(–blue-bg); }

.divider {
height: 52px; display: flex; align-items: center; justify-content: center;
background: var(–bg); border-top: 1px solid var(–border); border-bottom: 1px solid var(–border);
flex-shrink: 0; gap: 12px; position: relative; z-index: 10;
}

.status-pill {
font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
color: var(–muted); padding: 6px 16px; border-radius: 999px;
border: 1px solid var(–border); transition: all 0.25s; white-space: nowrap;
}
.status-pill.listening-pt { color: var(–green); border-color: var(–green); background: var(–green-bg); }
.status-pill.listening-en { color: var(–blue); border-color: var(–blue); background: var(–blue-bg); }
.status-pill.translating  { color: var(–orange); border-color: var(–orange); }
.status-pill.speaking     { color: var(–blue); border-color: var(–blue); }

.mode-badge {
font-size: 10px; letter-spacing: 1px; color: var(–muted);
padding: 3px 8px; border-radius: 999px; border: 1px solid var(–border);
position: absolute; right: 12px;
}
.mode-badge.online  { color: var(–green); border-color: rgba(0,229,160,0.3); }
.mode-badge.offline { color: var(–orange); border-color: rgba(255,170,0,0.3); }

.person-flag { font-size: 52px; line-height: 1; transition: transform 0.2s; }
.half.active .person-flag { transform: scale(1.12); }

.person-label {
font-size: 12px; font-weight: 700; letter-spacing: 3px;
text-transform: uppercase; color: var(–muted); transition: color 0.2s;
}
.half.active .person-label { color: var(–green); }
.half.active.english .person-label { color: var(–blue); }

.bubble {
background: var(–card); border: 1px solid var(–border);
border-radius: 18px; padding: 14px 16px; width: 100%;
max-width: 340px; min-height: 64px;
display: flex; flex-direction: column; gap: 8px;
transition: border-color 0.25s;
}
.half.active .bubble { border-color: var(–green); }
.half.active.english .bubble { border-color: var(–blue); }

.bubble-original { font-size: 15px; line-height: 1.5; color: var(–text); min-height: 24px; word-break: break-word; }
.bubble-original.dim { color: var(–muted); font-size: 13px; font-weight: 400; }
.bubble-original.interim { color: rgba(238,238,248,0.35); font-style: italic; }

.bubble-divider { height: 1px; background: var(–border); display: none; }
.bubble-divider.show { display: block; }

.bubble-translation {
font-size: 16px; font-weight: 700; line-height: 1.5;
color: var(–green); word-break: break-word; display: none;
}
.bubble-translation.show { display: block; }
.half.bottom .bubble-translation,
.half.active.english .bubble-translation { color: var(–blue); }

.tap-hint { font-size: 11px; color: var(–muted); letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }

.tap-ring {
width: 32px; height: 32px; border-radius: 50%;
border: 1.5px solid var(–muted);
display: flex; align-items: center; justify-content: center;
font-size: 15px; transition: all 0.25s; flex-shrink: 0;
}
.half.active .tap-ring {
border-color: var(–green);
box-shadow: 0 0 14px rgba(0,229,160,0.35);
animation: rpulse 1.2s ease-in-out infinite;
}
.half.active.english .tap-ring {
border-color: var(–blue);
box-shadow: 0 0 14px rgba(77,140,255,0.35);
}
@keyframes rpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
</style>

</head>
<body>
<div class="app">

  <div class="half top" id="halfPT" onclick="handleTap('pt')">
    <div class="person-flag">🇧🇷</div>
    <div class="person-label">Português</div>
    <div class="bubble" id="bubblePT">
      <div class="bubble-original dim" id="ptOriginal">Toque para falar</div>
      <div class="bubble-divider" id="ptDivider"></div>
      <div class="bubble-translation" id="ptTranslation"></div>
    </div>
    <div class="tap-hint">
      <div class="tap-ring" id="ptRing">🎙️</div>
      <span id="ptHint">toque para falar</span>
    </div>
  </div>

  <div class="divider">
    <div class="status-pill" id="statusPill">Tap a flag to start</div>
    <div class="mode-badge" id="modeBadge">●</div>
  </div>

  <div class="half bottom english" id="halfEN" onclick="handleTap('en')">
    <div class="person-flag">🇺🇸</div>
    <div class="person-label">English</div>
    <div class="bubble" id="bubbleEN">
      <div class="bubble-original dim" id="enOriginal">Tap to speak</div>
      <div class="bubble-divider" id="enDivider"></div>
      <div class="bubble-translation" id="enTranslation"></div>
    </div>
    <div class="tap-hint">
      <div class="tap-ring" id="enRing">🎙️</div>
      <span id="enHint">tap to speak</span>
    </div>
  </div>

</div>
<script>
  let activeSide = null;
  let isListening = false;
  let isSpeaking = false;
  let recognition = null;
  let isOnline = navigator.onLine;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

const halfPT = document.getElementById(‘halfPT’);
const halfEN = document.getElementById(‘halfEN’);
const statusPill = document.getElementById(‘statusPill’);
const modeBadge = document.getElementById(‘modeBadge’);
const ptOriginal = document.getElementById(‘ptOriginal’);
const ptDivider = document.getElementById(‘ptDivider’);
const ptTranslation = document.getElementById(‘ptTranslation’);
const enOriginal = document.getElementById(‘enOriginal’);
const enDivider = document.getElementById(‘enDivider’);
const enTranslation = document.getElementById(‘enTranslation’);
const ptRing = document.getElementById(‘ptRing’);
const enRing = document.getElementById(‘enRing’);
const ptHint = document.getElementById(‘ptHint’);
const enHint = document.getElementById(‘enHint’);

function updateBadge() {
modeBadge.textContent = isOnline ? ‘● Online’ : ‘● Offline’;
modeBadge.className = ’mode-badge ’ + (isOnline ? ‘online’ : ‘offline’);
}
window.addEventListener(‘online’,  () => { isOnline = true;  updateBadge(); });
window.addEventListener(‘offline’, () => { isOnline = false; updateBadge(); });
updateBadge();

function setStatus(text, cls) {
statusPill.textContent = text;
statusPill.className = ’status-pill ’ + (cls || ‘’);
}

function setActive(side) {
activeSide = side;
halfPT.classList.toggle(‘active’, side === ‘pt’);
halfEN.classList.toggle(‘active’, side === ‘en’);
ptRing.textContent = side === ‘pt’ ? ‘🔴’ : ‘🎙️’;
enRing.textContent = side === ‘en’ ? ‘🔴’ : ‘🎙️’;
ptHint.textContent = side === ‘pt’ ? ‘ouvindo… toque para parar’ : ‘toque para falar’;
enHint.textContent = side === ‘en’ ? ‘listening… tap to stop’ : ‘tap to speak’;
}

function clearActive() {
activeSide = null;
halfPT.classList.remove(‘active’);
halfEN.classList.remove(‘active’);
ptRing.textContent = ‘🎙️’;
enRing.textContent = ‘🎙️’;
ptHint.textContent = ‘toque para falar’;
enHint.textContent = ‘tap to speak’;
}

function showInterim(side, text) {
if (side === ‘pt’) { ptOriginal.textContent = text; ptOriginal.className = ‘bubble-original interim’; }
else               { enOriginal.textContent = text; enOriginal.className = ‘bubble-original interim’; }
}

function showResult(side, original, translation) {
if (side === ‘pt’) {
ptOriginal.textContent = original; ptOriginal.className = ‘bubble-original’;
ptDivider.className = ‘bubble-divider show’;
ptTranslation.textContent = translation; ptTranslation.className = ‘bubble-translation show’;
} else {
enOriginal.textContent = original; enOriginal.className = ‘bubble-original’;
enDivider.className = ‘bubble-divider show’;
enTranslation.textContent = translation; enTranslation.className = ‘bubble-translation show’;
}
}

function resetBubble(side) {
if (side === ‘pt’) {
ptOriginal.textContent = ‘…’; ptOriginal.className = ‘bubble-original interim’;
ptDivider.className = ‘bubble-divider’; ptTranslation.className = ‘bubble-translation’;
} else {
enOriginal.textContent = ‘…’; enOriginal.className = ‘bubble-original interim’;
enDivider.className = ‘bubble-divider’; enTranslation.className = ‘bubble-translation’;
}
}

function handleTap(side) {
if (isSpeaking) { window.speechSynthesis.cancel(); isSpeaking = false; }
if (isListening && activeSide === side) { stopListening(); return; }
if (isListening) stopListening();
startListening(side);
}

function startListening(side) {
if (!SR) { setStatus(‘Browser not supported’, ‘’); return; }
recognition = new SR();
recognition.continuous = false;
recognition.interimResults = true;
recognition.lang = side === ‘pt’ ? ‘pt-BR’ : ‘en-US’;
recognition.maxAlternatives = 1;
recognition._finalText = ‘’;

```
recognition.onstart = () => {
  isListening = true;
  setActive(side);
  resetBubble(side);
  setStatus(side === 'pt' ? 'Ouvindo...' : 'Listening...', side === 'pt' ? 'listening-pt' : 'listening-en');
};

recognition.onresult = (e) => {
  let interim = '', final = '';
  for (let i = e.resultIndex; i < e.results.length; i++) {
    const t = e.results[i][0].transcript;
    if (e.results[i].isFinal) final += t; else interim += t;
  }
  if (interim) showInterim(side, interim);
  if (final) { recognition._finalText = final.trim(); stopListening(); }
};

recognition.onerror = (e) => {
  if (e.error === 'no-speech' || e.error === 'aborted') return;
  setStatus('Mic error: ' + e.error, '');
  isListening = false; clearActive();
};

recognition.onend = () => {
  isListening = false;
  const text = recognition._finalText;
  if (text) { doTranslate(side, text); }
  else { clearActive(); setStatus('Tap a flag to start', ''); }
};

try { recognition.start(); } catch(e) { setStatus('Mic error', ''); isListening = false; }
```

}

function stopListening() {
if (recognition) { try { recognition.stop(); } catch(e) {} }
}

async function doTranslate(side, text) {
setStatus(‘Translating…’, ‘translating’);
const toLang = side === ‘pt’ ? ‘English’ : ‘Brazilian Portuguese’;
try {
const res = await fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’ },
body: JSON.stringify({
model: ‘claude-sonnet-4-20250514’,
max_tokens: 200,
messages: [{ role: ‘user’, content: `Translate to ${toLang}. Reply with ONLY the translation, nothing else:\n\n${text}` }]
})
});
const data = await res.json();
const translated = data?.content?.[0]?.text?.trim();
if (!translated) throw new Error(‘empty’);
showResult(side, text, translated);
speak(translated, side === ‘pt’ ? ‘en-US’ : ‘pt-BR’);
} catch(e) {
setStatus(isOnline ? ‘Translation failed — try again’ : ‘No internet connection’, ‘’);
clearActive();
}
}

function speak(text, lang) {
window.speechSynthesis.cancel();
const utt = new SpeechSynthesisUtterance(text);
utt.lang = lang; utt.rate = 0.93; utt.pitch = 1;
const voices = window.speechSynthesis.getVoices();
let v;
if (lang === ‘pt-BR’) {
v = voices.find(x => x.lang === ‘pt-BR’) || voices.find(x => x.lang.startsWith(‘pt’));
} else {
v = voices.find(x => x.lang.startsWith(‘en’) && (x.name.includes(‘Samantha’) || x.name.includes(‘Google US’) || x.name.includes(‘Daniel’)))
|| voices.find(x => x.lang.startsWith(‘en’));
}
if (v) utt.voice = v;
utt.onstart = () => { isSpeaking = true; setStatus(‘Speaking…’, ‘speaking’); };
utt.onend   = () => { isSpeaking = false; clearActive(); setStatus(‘Tap a flag to start’, ‘’); };
utt.onerror = () => { isSpeaking = false; clearActive(); setStatus(‘Tap a flag to start’, ‘’); };
window.speechSynthesis.speak(utt);
}

window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</body>
</html>
